server:
  port: 8080

spring:
  application:
    name: anime-website

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java, src/main/resources
      exclude: static/**, templates/**
      poll-interval: 2000ms
      quiet-period: 1000ms
    livereload:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/anime_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Cptbtptp123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: anime-website-jwt-secret-key-2024-secure-random-string
  expiration: 604800000

logging:
  level:
    org.springframework.security: INFO
    com.anime: DEBUG