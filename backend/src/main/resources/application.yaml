server:
  port: 8080

spring:
  application:
    name: anime-website

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java, src/main/resources
      exclude: static/**, templates/**
      poll-interval: 2000ms
      quiet-period: 1000ms
    livereload:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/anime_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: anime_user
    password: Anime@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

  rabbitmq:
    host: 10.137.229.133 # 你的虚拟机IP
    port: 5672 # 端口
    virtual-host: zhy_host # 虚拟主机
    username: zhy # 用户名
    password: 123456 # 密码

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: anime-website-jwt-secret-key-2024-secure-random-string
  expiration: 604800000

logging:
  level:
    org.springframework.security: INFO
    com.anime: DEBUG