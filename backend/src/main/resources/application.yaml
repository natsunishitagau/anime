server:
  port: 8080

spring:
  application:
    name: anime-website

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java, src/main/resources
      exclude: static/**, templates/**
      poll-interval: 2000ms
      quiet-period: 1000ms
    livereload:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/anime_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: anime_user
    password: Anime@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

  rabbitmq:
    host: 10.137.76.21 # 你的虚拟机IP
    port: 5672 # 端口
    virtual-host: zhy_host # 虚拟主机
    username: zhy # 用户名
    password: 123456 # 密码

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: anime-website-jwt-secret-key-2024-secure-random-string
  expiration: 604800000

# ──────────────────────────── 弹幕限流配置 ────────────────────────────
danmaku:
  rate-limit:
    # 用户级 — 令牌桶（Token Bucket）：允许短时突发，长期平滑限速
    user:
      capacity: 5        # 桶容量（最多可积攒 5 个令牌，支撑短时连发）
      refill-rate: 1.0   # 每秒补充令牌数（稳定状态下 1 次/秒）

    # 房间级 — 滑动窗口（Sliding Window）：精确控制时间窗口内请求总数
    room:
      window-seconds: 1  # 窗口大小（秒）
      max-requests: 20   # 窗口内最大请求数

    # IP 级 — 漏桶（Leaky Bucket）：恒定速率处理，削峰填谷
    ip:
      capacity: 10       # 桶容量（最多积压 10 个请求的"水"）
      leak-rate: 5.0     # 每秒漏出速率（稳定处理 5 次/秒，共享 IP 友好）

logging:
  level:
    org.springframework.security: INFO
    com.anime: DEBUG